site_name: ScpTensor
site_description: DIA-Based Single-Cell Proteomics Preprocessing Toolkit
exclude_docs: README.md
theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - search.suggest
    - search.highlight

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [.]
          options:
            show_root_heading: true
            show_source: true
            show_bases: true
            heading_level: 2

nav:
  - Home: index.md
  - API Reference: api.md
  - Workflows: user_workflows.md
  - Contracts:
    - Aggregation: aggregation_contract.md
    - Normalization: normalization_contract.md
    - Imputation: imputation_contract.md
    - Integration: integration_contract.md
