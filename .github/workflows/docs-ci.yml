name: Docs CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'README.md'
      - 'docs/**'
      - 'benchmark/**'
      - 'scripts/docs/**'
      - 'tests/docs/**'
      - '.github/workflows/docs-ci.yml'
      - '.github/workflows/README.md'
  pull_request:
    branches: [main, develop]
    paths:
      - 'README.md'
      - 'docs/**'
      - 'benchmark/**'
      - 'scripts/docs/**'
      - 'tests/docs/**'
      - '.github/workflows/docs-ci.yml'
      - '.github/workflows/README.md'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  docs-contracts:
    name: docs-contracts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate review manifest contracts
        run: |
          uv run python scripts/docs/validate_review_manifest.py
