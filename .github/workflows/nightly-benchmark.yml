name: Nightly Benchmarks

on:
  schedule:
    # Run at 2 AM UTC every day
    - cron: '0 2 * * *'
  workflow_dispatch:

env:
  FORCE_COLOR: 1
  UV_CACHE_DIR: ${{ github.workspace }}/.cache/uv

jobs:
  benchmark:
    name: Performance Benchmarks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache UV packages
        uses: actions/cache@v4
        with:
          path: |
            .venv
            ${{ env.UV_CACHE_DIR }}
          key: ${{ runner.os }}-py312-bench-uv-${{ hashFiles('pyproject.toml', 'uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-py312-bench-uv-

      - name: Install dependencies
        run: |
          uv sync --all-extras
          uv sync --group dev

      - name: Run benchmark CLI smoke checks
        run: |
          uv run python benchmark/aggregation/run_benchmark.py --help
          uv run python benchmark/normalization/run_benchmark.py --help
          uv run python benchmark/imputation/run_benchmark.py --help
          uv run python benchmark/integration/run_benchmark.py --help
          uv run python benchmark/autoselect/run_strategy_comparison.py --help
          uv run python benchmark/autoselect/run_normalization_literature_score.py --help
          uv run python benchmark/autoselect/run_synthetic_normalization_stress.py --help

  regression-test:
    name: Benchmark Regression Smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          uv sync --all-extras
          uv sync --group dev

      - name: Run synthetic benchmark smoke
        run: |
          uv run python benchmark/autoselect/run_synthetic_normalization_stress.py \
            --scenario-mode literature_matched \
            --max-scenarios 6 \
            --output-dir /tmp/scptensor-nightly-benchmark-smoke
